<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="background-container">
        <div class="container">
            <div class="title">
                <h1 class="result"> 0 </h1> 
            </div>
            
            <div class="keys">
                <button type="submit" class="key seven">7</button>
                <button type="submit" class="key eight">8</button>
                <button type="submit" class="key nine">9</button>
                <button type="submit" class="key division">/</button>
                <button type="submit" class="key four">4</button>
                <button type="submit" class="key five">5</button>
                <button type="submit" class="key six">6</button>
                <button type="submit" class="key multiplication">x</button>
                <button type="submit" class="key one">1</button>
                <button type="submit" class="key two">2</button>
                <button type="submit" class="key three">3</button>                
                <button type="submit" class="key subtraction">-</button>
                <button type="submit" class="key dot">,</button>
                <button type="submit" class="key zero">0</button>                
                <button type="submit" class="key equal">=</button>
                <button type="submit" class="key sum">+</button>                           
            </div>
        </div>        
    </main>

    <script src="assets/js/main.js"></script>
    
</body>
</html>
