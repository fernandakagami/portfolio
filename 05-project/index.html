<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="background-container">
        <div class="container">
            <div class="title">
                <h1 class="display-result">0</h1> 
            </div>
            
            <div class="keys">
                <button type="submit" class="key" data-number>7</button>
                <button type="submit" class="key" data-number>8</button>
                <button type="submit" class="key" data-number>9</button>
                <button type="submit" class="key" data-operation>/</button>
                <button type="submit" class="key" data-number>4</button>
                <button type="submit" class="key" data-number>5</button>
                <button type="submit" class="key" data-number>6</button>
                <button type="submit" class="key" data-operation>x</button>
                <button type="submit" class="key" data-number>1</button>
                <button type="submit" class="key" data-number>2</button>
                <button type="submit" class="key" data-number>3</button>                
                <button type="submit" class="key" data-operation>-</button>
                <button type="submit" class="key" data-delete>C</button>
                <button type="submit" class="key" data-number>0</button>                
                <button type="submit" class="key" data-equal>=</button>
                <button type="submit" class="key" data-operation>+</button>                           
            </div>
        </div>        
    </main>

    <script src="assets/js/main.js"></script>
    
</body>
</html>
